name: Scrape LK21 Movies

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link halaman utama'
        required: true
        default: 'https://tv6.lk21official.cc/genre/film'
      startpage:
        description: 'Halaman mulai'
        required: false
        default: '1'
      endpage:
        description: 'Halaman akhir (0 = auto)'
        required: false
        default: '0'
      limitfilm:
        description: 'Limit film (0 = semua)'
        required: false
        default: '10'
      group:
        description: 'Group title'
        required: false
        default: 'Movies LK21'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl

      - name: Jalankan PHP built-in server
        run: |
          cd scraper
          php -S 127.0.0.1:8080 &
          SERVER_PID=$!
          sleep 2
          curl "http://127.0.0.1:8080/lk.php?link=${{ github.event.inputs.link }}&startpage=${{ github.event.inputs.startpage }}&endpage=${{ github.event.inputs.endpage }}&limitfilm=${{ github.event.inputs.limitfilm }}&group=${{ github.event.inputs.group }}" --output ../playlist.m3u
          kill $SERVER_PID
          cd ..
          echo "✅ Selesai!"

      - name: Upload hasil
        uses: actions/upload-artifact@v4
        with:
          name: lk21-playlist
          path: playlist.m3u
